<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HorrorStack</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">

    <h1>🎃 HorrorStack</h1>

    <p>Your personal horror movie collection.</p>

    <input type="text" placeholder="Search movies...">

    <br><br>

    <button>Add Movie</button>

<div id="movieModal" class="modal">
    <div class="modal-content">
        <h2>Add Horror Movie</h2>

        <input type="text" id="movieTitle" placeholder="Movie title">
        <input type="text" id="movieYear" placeholder="Year">
        <input type="text" id="movieGenre" placeholder="Genre">
        <input type="number" id="movieRating" placeholder="Rating 1-10">

        <button>Save Movie</button>
        <button>Cancel</button>
    </div>
</div>
</div>
<div id="movieList"></div>
<script src="script.js"></script>
</body>
</html>
