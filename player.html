<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HorrorStack TV Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🎃 HorrorStack TV</h1>
    <h2>📺 Now Playing</h2>
<div class="channel-card">
    <h3 id="channelTitle">Loading Channel...</h3>

    <video id="tvPlayer" controls autoplay playsinline>
        <source id="videoSource" src="" type="application/x-mpegURL">
        Your browser does not support video.
    </video>

    <p>HorrorStack TV Player</p>

    <a href="index.html" class="watch-button">
        ← Back to Channels
    </a>
</div>
    
</div>
<script>
const channels = {
  "haunted-house": {
    title: "Haunted House",
    stream: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
  },
  "midnight-hospital": {
    title: "Midnight Hospital",
    stream: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
  },
  "scarecrow-field": {
    title: "Scarecrow Field",
    stream: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
  },
  "possession-room": {
    title: "Possession Room",
    stream: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
  },
  "creeper-road": {
    title: "Creeper Road",
    stream: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
  },
  "phantasm": {
    title: "Phantasm",
    stream: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
  },
  "haddonfield": {
    title: "Haddonfield",
    stream: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
  },
  "graveyard-shift": {
    title: "Graveyard Shift",
    stream: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
  }
};

const params = new URLSearchParams(window.location.search);
const channelId = params.get("channel") || "haunted-house";
const channel = channels[channelId];

const title = document.getElementById("channelTitle");
const video = document.getElementById("tvPlayer");
const source = document.getElementById("videoSource");

if (channel) {
  title.textContent = channel.title;
  source.src = channel.stream;
  video.load();
} else {
  title.textContent = "Channel Not Found";
}
</script>
</body>
</html>
